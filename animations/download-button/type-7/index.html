<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Countdown Launch Button</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<button class="launch-btn" id="launchBtn">

  <!-- SVG RING (perfect center system) -->
  <svg class="ring" viewBox="0 0 240 240">
    <circle class="bg" cx="120" cy="120" r="90"></circle>
    <circle class="progress" cx="120" cy="120" r="90"></circle>
  </svg>

  <!-- glow layer -->
  <div class="glow"></div>

  <!-- center core -->
  <div class="core">
    <div class="rocket">🚀</div>
    <div class="text">LAUNCH</div>
  </div>

  <div class="particles"></div>

</button>

<script src="script.js"></script>
</body>
</html>
