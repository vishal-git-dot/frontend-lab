<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbital Tab System</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="space-grid"></div>

  <div class="nebula nebula-a"></div>
  <div class="nebula nebula-b"></div>

  <main class="orbital-ui">

    <div class="core-ring ring-1"></div>
    <div class="core-ring ring-2"></div>
    <div class="core-ring ring-3"></div>

    <div class="center-core">
      <div class="pulse"></div>

      <div class="core-content">
        <h1 id="title">Analytics</h1>
        <p id="desc">
          Advanced data visualization interface with realtime orbital processing.
        </p>
      </div>
    </div>

    <button
  class="orbit-node active"
  data-label="Analytics"
  data-title="Analytics"
  data-desc="Advanced data visualization interface with realtime orbital processing."
  style="--angle:0deg;"
>
  ✦
</button>

<button
  class="orbit-node"
  data-label="Neural AI"
  data-title="Neural AI"
  data-desc="Cognitive interaction layer powered by adaptive intelligence systems."
  style="--angle:72deg;"
>
  ◎
</button>

<button
  class="orbit-node"
  data-label="Projects"
  data-title="Projects"
  data-desc="Dynamic workspace environment for collaborative creative development."
  style="--angle:144deg;"
>
  ◈
</button>

<button
  class="orbit-node"
  data-label="Signals"
  data-title="Signals"
  data-desc="Encrypted communication channel with quantum synchronization."
  style="--angle:216deg;"
>
  ✉
</button>

<button
  class="orbit-node"
  data-label="Systems"
  data-title="Systems"
  data-desc="Infrastructure monitoring and autonomous system control center."
  style="--angle:288deg;"
>
  ⌬
</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
