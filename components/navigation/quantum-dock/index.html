<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quantum Dock Menu</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="bg-grid"></div>

  <main class="container">

    <div class="dock-wrapper">

      <div class="dock-glow"></div>

      <div class="dock">

        <button class="dock-item active" data-label="Home">
          <span class="icon">⌂</span>
        </button>

        <button class="dock-item" data-label="Explore">
          <span class="icon">✦</span>
        </button>

        <button class="dock-item" data-label="Projects">
          <span class="icon">◈</span>
        </button>

        <button class="dock-item" data-label="Messages">
          <span class="icon">✉</span>
        </button>

        <button class="dock-item" data-label="Profile">
          <span class="icon">◎</span>
        </button>

        <div class="indicator"></div>

      </div>

    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
