
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinetic Route Switcher V2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-grid"></div>

<div class="switcher-shell">

    <div class="shell-glow"></div>

    <nav class="kinetic-nav">

        <div class="magnetic-track">

            <div class="energy-rail"></div>

            <div class="liquid-capsule">
                <div class="capsule-reflection"></div>
            </div>

            <button class="route active">Home</button>
            <button class="route">Discover</button>
            <button class="route">Projects</button>
            <button class="route">Studio</button>
            <button class="route">Contact</button>

        </div>

    </nav>

    <div class="view-panel">

        <div class="page active">
            <h1>HOME</h1>
            <p>Future navigation system online.</p>
        </div>

        <div class="page">
            <h1>DISCOVER</h1>
            <p>Motion-first interface experiments.</p>
        </div>

        <div class="page">
            <h1>PROJECTS</h1>
            <p>Interactive digital experiences.</p>
        </div>

        <div class="page">
            <h1>STUDIO</h1>
            <p>Design engineering ecosystem.</p>
        </div>

        <div class="page">
            <h1>CONTACT</h1>
            <p>Open communication channels.</p>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
