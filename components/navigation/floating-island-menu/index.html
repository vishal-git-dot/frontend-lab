<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Island Menu</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="island-wrapper">

    <nav class="floating-island" id="island">

        <div class="island-core" id="toggleBtn">

            <div class="core-glow"></div>

            <div class="logo">
                <span>◉</span>
            </div>

            <div class="status">
                <span>Navigation</span>
            </div>

            <div class="menu-icon">
                <span></span>
                <span></span>
            </div>

        </div>

        <div class="island-panel">

            <button class="nav-card active">
                <div class="icon">✦</div>
                <h4>Dashboard</h4>
                <p>System overview</p>
            </button>

            <button class="nav-card">
                <div class="icon">◎</div>
                <h4>Projects</h4>
                <p>Manage workflows</p>
            </button>

            <button class="nav-card">
                <div class="icon">⬢</div>
                <h4>Research</h4>
                <p>AI insights</p>
            </button>

            <button class="nav-card">
                <div class="icon">◈</div>
                <h4>Analytics</h4>
                <p>Performance data</p>
            </button>

            <button class="nav-card">
                <div class="icon">✧</div>
                <h4>Settings</h4>
                <p>Customize system</p>
            </button>

            <button class="nav-card">
                <div class="icon">◉</div>
                <h4>Profile</h4>
                <p>User controls</p>
            </button>

        </div>

    </nav>

</div>

<script src="script.js"></script>

</body>
</html>
